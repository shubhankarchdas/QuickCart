{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- ========================= SECTION CONTENT ========================= -->
<section class="section-conten padding-y bg">

<div class="container">
	<div class="row">

		{% include 'includes/dashboard_sidebar.html' %}

	<main class="col-md-9">
		<article class="card">
		<header class="card-header">
			<strong class="d-inline-block mr-3">Change Your Password</strong>
		</header>
		<div class="card-body">
		

				<div class="col-md-12">
					<form action="{% url 'change_password' %}" method="POST" enctype="multipart/form-data">
						{% csrf_token %}
						
					
						<div class="form-group">
							<label for="current_password">Current Password</label>
							<input type="password" name="current_password" class="form-control" placeholder="Enter Your Current Password" required>
						</div>
						<div class="form-group">
							<label for="new_password">Create New Password</label>
							<input type="password" name="confirm_password" class="form-control" placeholder="Enter Your New Password" required>	
						</div>
						<div class="form-group">
							<label for="confirm_password">Confirm New Password</label>
							<input type="password" name="new_password" class="form-control" placeholder="Confirm Your New Password" required>	
						</div>
						
						
						<input type="submit" class="btn btn-primary" value="Update Password">
						</form>
						</div>
			</div> <!-- row.// -->
		</div> <!-- card-body .// -->

		</article> <!-- order-group.// --> 
	</main>
</div> <!-- row.// -->
</div>


</section>
<!-- ========================= SECTION CONTENT END// ========================= -->


{% endblock %}
