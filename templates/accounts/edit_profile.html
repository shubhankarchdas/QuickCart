{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- ========================= SECTION CONTENT ========================= -->
<section class="section-conten padding-y bg">

<div class="container">
	<div class="row">

		{% include 'includes/dashboard_sidebar.html' %}

	<main class="col-md-9">
		<article class="card">
		<header class="card-header">
			<strong class="d-inline-block mr-3">Edit Your Profile</strong>
		</header>
		<div class="card-body">
			<div class="row"> 
			

				<div class="col-md-12">
					<form action="" method="POST" enctype="multipart/form-data">
						{% csrf_token %}
						<div class="form-row">
							<div class="form-group col-md-6">
								<label for="first_name">First Name</label>
								<input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}">		
							</div>
							<div class="form-group col-md-6">
								<label for="last_name">Last Name</label>
								<input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}">
							</div>
						</div>
						<div class="form-row">
							<div class="form-group col-md-6">
								<label for="phone_number">Phone Number</label>
								<input type="text" class="form-control" id="phone_number" name="phone_number" value="{{ user.phone_number }}">
							</div>
							<div class="form-group col-md-6">
								<label for="profile_picture">Profile Picture</label>
								<input type="file" class="form-control" id="profile_picture" name="profile_picture" value="{{ user.profile_picture }}">		
							</div>
						</div>
						<div class="form-group">
							<label for="address_line_1">Address Line 1</label>
							<input type="text" class="form-control" id="address_line_1" name="address_line_1" value="{{ user.address_line_1 }}">		
						</div>
						<div class="form-group">
							<label for="address_line_2">Address Line 2</label>
							<input type="text" class="form-control" id="address_line_2" name="address_line_2" value="{{ user.address_line_2 }}">
						</div>

						<div class="form-row">
							<div class="form-group col-md-4">
								<label for="city">City</label>
								<input type="text" class="form-control" id="city" name="city" value="{{ user.city }}">
							</div>
							<div class="form-group col-md-4">
								<label for="state">State</label>
								<input type="text" class="form-control" id="state" name="state" value="{{ user.state }}">		
							</div>
							<div class="form-group col-md-4">
								<label for="country">Country</label>
								<input type="text" class="form-control" id="country" name="country" value="{{ user.country }}">		
							</div>
						</div>
						<input type="submit" class="btn btn-primary" value="Update Profile">
						</form>
						</div>
			</div> <!-- row.// -->
		</div> <!-- card-body .// -->

		</article> <!-- order-group.// --> 
	</main>
</div> <!-- row.// -->
</div>


</section>
<!-- ========================= SECTION CONTENT END// ========================= -->


{% endblock %}
