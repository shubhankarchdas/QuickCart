{% extends 'base.html' %}
{% block content %}
{% load static %}

<section class="section-content padding-y bg">
    <div class="container">
    
    <!-- ============================ COMPONENT 1 ================================= -->

    <div class="row">
        <aside class="col-lg-6">
    <div class="card">
        <div class="card-body">
            <h4 class="card-title mb-4">Billing Address</h4>
            <form action="{% url 'place_order' %}" method="POST">
                {% csrf_token %}
                <div class="form-row">
                    <div class="col form-group">
                        <label for="">First Name</label>
                        <input type="text" class="form-control" name="first_name" placeholder="Enter Your First Name" required>
                    </div>
                    <div class="col form-group">
                        <label for="">Last Name</label>
                        <input type="text" class="form-control" name="last_name" placeholder="Enter Your Last Name" required>
                    </div>
                    </div>
                <div class="form-row">
                    <div class="col form-group">
                        <label for="">Email</label>
                        <input type="eamil" class="form-control" name="email" placeholder="Enter Your Email" required>
                    </div>
                    <div class="col form-group">
                        <label for="">Phone Number</label>
                        <input type="text" class="form-control" name="phone" placeholder="Enter Your Phone Number" required>
                    </div>
                    </div>
                <div class="form-row">
                    <div class="col form-group">
                        <label for="">Address Line 1</label>
                        <input type="text" class="form-control" name="address_line_1" placeholder="Enter Your Address" required>
                    </div>
                    <div class="col form-group">
                        <label for="">Address Line 2</label>
                        <input type="text" class="form-control" name="address_line_2" placeholder="Optional">
                    </div>
                    </div>
                <div class="form-row">
                    <div class="col form-group">
                        <label for="">City</label>
                        <input type="text" class="form-control" name="city" placeholder="Enter Your City" required>
                    </div>
                    <div class="col form-group">
                        <label for="">State</label>
                        <input type="text" class="form-control" name="state" placeholder="Enter Your State" required>
                    </div>
                    </div>
                <div class="form-row">
                    <div class="col form-group">
                        <label for="">Zip Code</label>
                        <input type="text" class="form-control" name="zip_code" placeholder="Enter Your Zip Code" required>
                    </div>
                    <div class="col form-group">
                        <label for="">Country</label>
                        <input type="text" class="form-control" name="country" placeholder="Enter Your Country" required>
                    </div>
                    </div>
                <div class="form-row">
                    <label for="">Order Note</label>   
                    <textarea name="order_note" rows="2" class="form-control"></textarea>     

        </div>

    </div> <!-- card.// -->
    
        </aside> <!-- col.// -->
        <aside class="col-lg-6">
    
            <div class="card">
            <f class="card-body">
                    <table class="table table-borderless table-shopping-cart">
    <thead class="text-muted">
    <tr class="small text-uppercase">
      <th scope="col">Product</th>
      <th scope="col" width="120">Quantity</th>
      <th scope="col" width="120">Price</th>
    </tr>
    </thead>
    <tbody>
        {% for cart_item in cart_items %}
    <tr>
        <td>
            <figure class="itemside align-items-center">
                <div class="aside"><a href="{{cart_item.product.get_url}}"><img src="{{cart_item.product.image.url}}" class="img-sm"></a></div>
                <figcaption class="info">
                    <a href="{{cart_item.product.get_url}}" class="title text-dark">{{cart_item.product.product_name}}</a>
                    <p class="text-muted small">
                        {% if cart_item.variation.all %}
                        {% for item in cart_item.variation.all %}
                            {{item.variation_category | capfirst}}: {{item.variation_value | capfirst}}<br>
                        {% endfor %}
                    {% endif %}
                    </p>

                </figcaption>
            </figure>
        </td>
        <td> 
            <label for="">{{cart_item.quantity}}</label>
        </td>
        <td> 
            <div class="price-wrap"> 
                <var class="price">$ {{cart_item.sub_total}}</var> 
                <small class="text-muted"> ${{cart_item.product.price}} each </small> 
            </div> <!-- price-wrap .// -->
        </td>
    </tr>
        {% endfor %}
    
    </tbody>
    </table>
                <button type="submit" name="submit" class="btn btn-primary btn-block">Place Order </button>
                <a href="{% url 'store' %}" class="btn btn-light btn-block">Continue Shopping</a>
    </form>
            </div> <!-- card-body.// -->
            </div> <!-- card.// -->
    
    </aside> <!-- col.// -->
    
    
    </div> <!-- row.// -->
    <!-- ============================ COMPONENT 1 END .// ================================= -->
    
    </div> <!-- container .//  -->
    </section>
    <!-- ========================= SECTION CONTENT END// ========================= -->
    



{% endblock %}
