{% load static %}

<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="cache-control" content="max-age=604800" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>{% block title %}QuickCart | One of the Biggest Online Shopping Platform{% endblock %}</title> 

<link href="{% static './images/favicon.ico' %}"  rel="shortcut icon" type="image/x-icon">

<!-- jQuery -->

<!-- Bootstrap4 files-->
<script src="{% static 'js/bootstrap.bundle.min.js' %}" type="text/javascript"></script>
<link href="{% static 'css/bootstrap.css' %}" rel="stylesheet" type="text/css"/>

<!-- Font awesome 5 -->
<link href="{% static 'fonts/fontawesome/css/all.min.css' %}" type="text/css" rel="stylesheet">

<!-- custom style -->
<link href="{% static 'css/ui.css' %}" rel="stylesheet" type="text/css"/>
<link href="{% static 'css/responsive.css' %}" rel="stylesheet" media="only screen and (max-width: 1200px)" />

<!-- custom javascript -->
<script src="{% static 'js/script.js' %}" type="text/javascript"></script>

<script type="text/javascript">
/// some script

// jquery ready start
$(document).ready(function() {
	// jQuery code

}); 
// jquery end
</script>


  <!-- Toaster Message Implemention Css & Js -->
  <script>
    window.djangoMessages = [
      {% for message in messages %}
        {
          "tags": "{{ message.tags }}",
          "message": "{{ message|escapejs }}"
        }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ];
    console.log("djangoMessages:", window.djangoMessages);  // Debug output
  </script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Include external toast script -->
  <script src="{% static 'js/toast_message.js' %}"></script>

  <!-- End Toast-->

</head>
<body>

<!-- navber -->
{% include 'includes/navber.html' %}

{% block content %}
<!-- ========================= content ========================= -->
{% endblock %}

<!-- footer -->
{% include 'includes/footer.html' %}

</body>
</html>
